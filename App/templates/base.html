<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name='theme-color' content='#1D9E75'>
    <meta name='description' content='LeafLens — AI-powered plant disease detection'>
    <link rel='manifest' href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/ionicons/2.0.1/css/ionicons.min.css">
    
    <link rel = "stylesheet" href = "https://cdnjs.cloudflare.com/ajax/libs/bttn.css/0.2.4/bttn.css">

    <title>LeafLens - {% block pagetitle %}

        {% endblock pagetitle %}</title>
    <style>
        .bg {

            background-image: url("images/background.jpeg");

            height: 100%;

            /* Center and scale the image nicely */
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
        }

        .file-upload input[type='file'] {
            display: none;
        }

        body {
            background-color:white;
            /* background: -webkit-linear-gradient(to right, #66a776, #043610);
            background: linear-gradient(to right, #5d9c6a, #059b0d); */
            height: 100vh;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
        }

        .rounded-lg {
            border-radius: 1rem;
        }

        .custom-file-label.rounded-pill {
            border-radius: 50rem;
        }

        .custom-file-label.rounded-pill::after {
            border-radius: 0 50rem 50rem 0;
        }

        label {
        
            background-color: rgb(2, 46, 15);
            color: white;
            padding: 0.5rem;
            font-family: sans-serif;
            border-radius: 0.3rem;
            cursor: pointer;
            margin-top: 1rem;
        }

        #file-chosen {
            margin-left: 0.3rem;
            font-family: sans-serif;
        }

        .footer-basic {
            margin-top: 10%;
            padding: 40px 0;
            background-color: #042908;
            color: #f1f3f5;
        }

     
    </style>
</head>

<body>
    <div class="layout-shell">
        <aside class="sidebar">
            <div class="logo-block">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22C12 22 20 18 20 11C20 6 16 2 12 2C8 2 4 6 4 11C4 18 12 22 12 22Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M12 22V11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 15C12 15 15.5 13 16.5 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <div class="logo-text">
                    <div class="logo-title">LeafLens</div>
                    <div class="logo-subtitle">AI Plant Health</div>
                </div>
            </div>
            
            <nav class="nav-links">
                <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                    <div class="nav-dot"></div> Home
                </a>
                <a class="nav-link {% if request.path == '/index' %}active{% endif %}" href="/index">
                    <div class="nav-dot"></div> Detect Disease
                </a>
                <a class="nav-link {% if request.path == '/history' %}active{% endif %}" href="/history">
                    <div class="nav-dot"></div> History
                </a>
                <a class="nav-link {% if request.path == '/market' %}active{% endif %}" href="/market">
                    <div class="nav-dot"></div> Market
                </a>
                <a class="nav-link {% if request.path == '/contact' %}active{% endif %}" href="/contact">
                    <div class="nav-dot"></div> Contact
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="scan-counter">
                    <span>Daily Scans</span>
                    <span>3 / 10</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" style="width: 30%;"></div>
                </div>
            </div>
        </aside>

        <main class="main-column">
            <header class="topbar">
                <span style="font-weight: 600; color: #555; font-size: 15px;">Dashboard</span>
            </header>
            
            <div class="content-area">
                {% block content %}

                {% endblock content %}
                <div class="footer-basic">
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.1.3/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/particles.js') }}"></script>
    <script src="{{ url_for('static', filename='js/tilt.js') }}"></script>
    
    <div class='bottom-nav'><a href='/' class='bn-item'><svg width='18' height='18' viewBox='0 0 18 18' fill='none'><path d='M2 9L9 2L16 9V16H12V12H6V16H2V9Z' stroke='currentColor' stroke-width='1.4' stroke-linejoin='round' fill='none'/></svg>Home</a><a href='/index' class='bn-item'><svg width='18' height='18' viewBox='0 0 18 18' fill='none'><circle cx='9' cy='9' r='7' stroke='currentColor' stroke-width='1.4' fill='none'/><circle cx='9' cy='9' r='3' stroke='currentColor' stroke-width='1.4' fill='none'/></svg>Scan</a><a href='/history' class='bn-item'><svg width='18' height='18' viewBox='0 0 18 18' fill='none'><circle cx='9' cy='9' r='7' stroke='currentColor' stroke-width='1.4' fill='none'/><path d='M9 5V9L12 11' stroke='currentColor' stroke-width='1.4' stroke-linecap='round' fill='none'/></svg>History</a><a href='/market' class='bn-item'><svg width='18' height='18' viewBox='0 0 18 18' fill='none'><path d='M2 3H4L6 12H14L16 6H5' stroke='currentColor' stroke-width='1.4' stroke-linecap='round' stroke-linejoin='round' fill='none'/><circle cx='7' cy='15' r='1' fill='currentColor'/><circle cx='13' cy='15' r='1' fill='currentColor'/></svg>Market</a></div>
</body>

</html>
